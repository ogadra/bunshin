worker_processes auto;

events {
    worker_connections 1024;
}

http {
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"upstream_addr":"$upstream_addr"}';

    access_log /dev/stdout json_combined;
    error_log /dev/stderr warn;

    server_tokens off;

    server {
        listen 8080;
        server_name _;

        resolver ${NGINX_RESOLVER} valid=10s;
        client_max_body_size 1m;

        include /etc/nginx/errors.conf;

        location /health {
            access_log off;
            default_type text/plain;
            return 200 'OK';
        }

        location = /api/execute {
            auth_request /_resolve;
            auth_request_set $runner_url $upstream_http_x_runner_url;
            auth_request_set $resolve_set_cookie $upstream_http_set_cookie;
            auth_request_set $session_reassigned $upstream_http_x_session_reassigned;
            add_header Set-Cookie $resolve_set_cookie;
            add_header X-Session-Reassigned $session_reassigned;

            proxy_pass $runner_url$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_hide_header X-Runner-Url;

            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /api/ {
            auth_request /_resolve;
            auth_request_set $runner_url $upstream_http_x_runner_url;
            auth_request_set $resolve_set_cookie $upstream_http_set_cookie;
            auth_request_set $session_reassigned $upstream_http_x_session_reassigned;
            add_header Set-Cookie $resolve_set_cookie;
            add_header X-Session-Reassigned $session_reassigned;

            proxy_pass $runner_url$request_uri;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_hide_header X-Runner-Url;
        }

        location = /_resolve {
            internal;
            set $broker_upstream http://${BROKER_HOST}:8080;
            proxy_pass $broker_upstream/resolve;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }
    }
}
