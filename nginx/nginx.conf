worker_processes auto;
pid /tmp/nginx.pid;

env STACK_NAME;
env INTERNAL_DOMAIN;
env BUNSHIN_STACKS;
env RUNNER_PORT;
env RUNNER_APP_PORT;

events {
    worker_connections 1024;
}

http {
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"upstream_addr":"$upstream_addr",'
        '"forward_host":"$forward_host",'
        '"fallback_stack":"$fwd_fallback_stack",'
        '"fallback_remaining":"$fwd_fallback_remaining",'
        '"relay_fallback_stack":"$relay_fallback_stack",'
        '"relay_fallback_remaining":"$relay_fallback_remaining"}';

    access_log /dev/stdout json_combined;
    error_log /dev/stderr warn;

    server_tokens off;

    # port-forward serverと既存catch-allが同じ変数集合を持つ。
    # 既定のvariables_hash_max_size (1024) ではoptimal hashを組めずwarnが出る。
    variables_hash_max_size 2048;

    # access_by_lua から require("runner_url") 等を解決するための検索パス。
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

    init_by_lua_block {
        local core = require("resolve_core")
        core.configure(
            os.getenv("STACK_NAME"),
            os.getenv("INTERNAL_DOMAIN"),
            os.getenv("BUNSHIN_STACKS"),
            os.getenv("RUNNER_PORT"),
            os.getenv("RUNNER_APP_PORT")
        )
    }

    # port-forwardのWebSocket / SSE用。
    # UpgradeヘッダがあればConnection: upgradeを送り、空ならcloseを送る。
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 32 hex labelのHostのみここで受ける。
    # pf_resolve.luaが自stack判定とsessionの有無を確認し、runnerの:RUNNER_APP_PORTへ流す。
    # 未知stack / 他stack / 不在sessionはすべて404に丸め、cross-stack転送しない。
    server {
        listen 8080;
        server_name "~^[0-9a-f]{32}\.";

        resolver ${NGINX_RESOLVER} valid=10s;
        client_max_body_size 1m;

        set $pf_upstream "";

        include /etc/nginx/errors.conf;

        location / {
            access_by_lua_file /usr/local/openresty/nginx/lua/pf_resolve.lua;

            proxy_pass $pf_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_buffering off;
            proxy_cache off;
            proxy_connect_timeout 5s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # broker /resolve/appへのサブリクエスト。
        location = /_pf_resolve {
            internal;
            set $broker_upstream http://${BROKER_HOST}:8080;
            proxy_pass $broker_upstream/resolve/app;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Host $host;
            proxy_set_header Cookie "";
            proxy_set_header X-Runner-Host "";
            proxy_set_header X-Fallback-Stack "";
            proxy_set_header X-Fallback-Remaining "";
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }
    }

    server {
        listen 8080 default_server;
        server_name _;

        resolver ${NGINX_RESOLVER} valid=10s;
        client_max_body_size 1m;

        # resolve.luaがHostの完全一致で内部ALB判定を行い、以下の変数を上書きする。
        # /healthなどresolve.luaを通らないlocationでは空文字のままアクセスログに出る。
        set $relay_fallback_stack "";
        set $relay_fallback_remaining "";
        set $bunshin_client_address "";

        include /etc/nginx/errors.conf;

        location /health {
            access_log off;
            default_type text/plain;
            return 200 'OK';
        }

        # broker /resolve/sessionでセッションを解決してからrunnerへ本流proxy_passする。
        location /api/ {
            set $runner_url "";
            set $resolve_set_cookie "";
            set $resolve_expire_shell_cookie "";
            set $session_reassigned "";
            set $forward_host "";
            set $fwd_fallback_stack "";
            set $fwd_fallback_remaining "";

            access_by_lua_file /usr/local/openresty/nginx/lua/resolve.lua;

            # broker が返した Set-Cookie (session_id) と再割当てシグナルをクライアントへ伝える。
            add_header Set-Cookie $resolve_set_cookie always;
            add_header X-Session-Reassigned $session_reassigned always;

            proxy_pass $runner_url$request_uri;
            proxy_hide_header X-Runner-Host;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header X-Bunshin-Client-Address $bunshin_client_address;

            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location @forward_owner {
            proxy_pass https://$forward_host:443$request_uri;
            proxy_intercept_errors on;
            error_page 502 504 = @reassign_session;

            proxy_ssl_server_name on;
            proxy_ssl_name $forward_host;
            proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
            proxy_ssl_verify_depth 3;
            proxy_ssl_verify on;

            proxy_set_header Host $forward_host;
            proxy_set_header X-Fallback-Stack "";
            proxy_set_header X-Fallback-Remaining "";

            # error_page で再割当て先へ送る request body を保持するため、既定値への依存を避ける。
            proxy_request_buffering on;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header X-Bunshin-Client-Address $bunshin_client_address;

            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location @reassign_session {
            access_by_lua_file /usr/local/openresty/nginx/lua/reassign.lua;

            add_header Set-Cookie $resolve_set_cookie always;
            add_header Set-Cookie $resolve_expire_shell_cookie always;
            add_header X-Session-Reassigned $session_reassigned always;

            proxy_pass $runner_url$request_uri;
            proxy_hide_header X-Runner-Host;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Cookie "";
            proxy_set_header X-Bunshin-Client-Address $bunshin_client_address;

            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location @forward_reassigned_fallback {
            add_header Set-Cookie $resolve_expire_shell_cookie always;
            add_header X-Session-Reassigned $session_reassigned always;

            proxy_pass https://$forward_host:443$request_uri;
            proxy_ssl_server_name on;
            proxy_ssl_name $forward_host;
            proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
            proxy_ssl_verify_depth 3;
            proxy_ssl_verify on;

            proxy_set_header Host $forward_host;
            proxy_set_header Cookie "";
            proxy_set_header X-Fallback-Stack $fwd_fallback_stack;
            proxy_set_header X-Fallback-Remaining $fwd_fallback_remaining;

            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header X-Bunshin-Client-Address $bunshin_client_address;

            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location @forward_fallback {
            proxy_pass https://$forward_host:443$request_uri;
            proxy_ssl_server_name on;
            proxy_ssl_name $forward_host;
            proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
            proxy_ssl_verify_depth 3;
            proxy_ssl_verify on;

            proxy_set_header Host $forward_host;
            # 下流が公開経路と誤認しないよう、転送状態は lua が決めた値だけを渡し client 由来値は上書き消去する。
            proxy_set_header X-Fallback-Stack $fwd_fallback_stack;
            proxy_set_header X-Fallback-Remaining $fwd_fallback_remaining;

            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header X-Bunshin-Client-Address $bunshin_client_address;

            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # broker /resolve/sessionへのサブリクエスト専用。access_by_luaからngx.location.captureで呼ぶ。
        # $relay_fallback_*はsubrequestでは空文字にリセットされるため、親から継承する$http_x_*を使う。
        location = /_resolve {
            internal;
            set $broker_upstream http://${BROKER_HOST}:8080;
            proxy_pass $broker_upstream/resolve/session;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
            proxy_set_header X-Runner-Host "";
            proxy_set_header X-Fallback-Stack $http_x_fallback_stack;
            proxy_set_header X-Fallback-Remaining $http_x_fallback_remaining;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }

        location = /_resolve_reassigned {
            internal;
            set $broker_upstream http://${BROKER_HOST}:8080;
            proxy_pass $broker_upstream/resolve/session;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie "";
            proxy_set_header X-Runner-Host "";
            proxy_set_header X-Fallback-Stack $fwd_fallback_stack;
            proxy_set_header X-Fallback-Remaining $fwd_fallback_remaining;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }
    }
}
