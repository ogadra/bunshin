worker_processes auto;
pid /tmp/nginx.pid;

env STACK_NAME;
env INTERNAL_DOMAIN;
env BUNSHIN_STACKS;

events {
    worker_connections 1024;
}

http {
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"upstream_addr":"$upstream_addr"}';

    access_log /dev/stdout json_combined;
    error_log /dev/stderr warn;

    server_tokens off;

    # access_by_lua から require("runner_url") 等を解決するための検索パス。
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

    init_by_lua_block {
        local core = require("resolve_core")
        core.configure(os.getenv("STACK_NAME"), os.getenv("INTERNAL_DOMAIN"), os.getenv("BUNSHIN_STACKS"))
    }

    map $host $from_internal_alb {
        "~^[a-z-]+[0-9]+\." 1;
        default                  0;
    }

    # 公開経路からの X-Fallback-* 詐称を防ぐため、転送済みヘッダは内部ALB経由のときだけ中継する。
    map $from_internal_alb $relay_fallback_stack {
        1       $http_x_fallback_stack;
        default "";
    }
    map $from_internal_alb $relay_fallback_remaining {
        1       $http_x_fallback_remaining;
        default "";
    }
    map $from_internal_alb $relay_client_address {
        1       $http_x_bunshin_client_address;
        default "";
    }
    map $relay_client_address $edge_client_address {
        default $relay_client_address;
        ""      $http_cloudfront_viewer_address;
    }
    map $edge_client_address $bunshin_client_address {
        default $edge_client_address;
        ""      "$remote_addr:$remote_port";
    }

    server {
        listen 8080;
        server_name _;

        resolver ${NGINX_RESOLVER} valid=10s;
        client_max_body_size 1m;

        include /etc/nginx/errors.conf;

        location /health {
            access_log off;
            default_type text/plain;
            return 200 'OK';
        }

        # broker /resolve でセッションを解決してから runner へ本流 proxy_pass する。
        location /api/ {
            set $runner_url "";
            set $resolve_set_cookie "";
            set $session_reassigned "";
            set $forward_host "";
            set $fwd_fallback_stack "";
            set $fwd_fallback_remaining "";

            access_by_lua_file /usr/local/openresty/nginx/lua/resolve.lua;

            # broker が返した Set-Cookie (session_id) と再割当てシグナルをクライアントへ伝える。
            add_header Set-Cookie $resolve_set_cookie always;
            add_header X-Session-Reassigned $session_reassigned always;

            proxy_pass $runner_url$request_uri;
            proxy_hide_header X-Runner-Url;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header X-Bunshin-Client-Address $bunshin_client_address;

            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location @forward_owner {
            proxy_pass https://$forward_host:443$request_uri;
            proxy_ssl_server_name on;
            proxy_ssl_name $forward_host;
            proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
            proxy_ssl_verify_depth 3;
            proxy_ssl_verify on;

            proxy_set_header Host $forward_host;
            proxy_set_header X-Fallback-Stack "";
            proxy_set_header X-Fallback-Remaining "";

            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header X-Bunshin-Client-Address $bunshin_client_address;

            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location @forward_fallback {
            proxy_pass https://$forward_host:443$request_uri;
            proxy_ssl_server_name on;
            proxy_ssl_name $forward_host;
            proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
            proxy_ssl_verify_depth 3;
            proxy_ssl_verify on;

            proxy_set_header Host $forward_host;
            # 下流が公開経路と誤認しないよう、転送状態は lua が決めた値だけを渡し client 由来値は上書き消去する。
            proxy_set_header X-Fallback-Stack $fwd_fallback_stack;
            proxy_set_header X-Fallback-Remaining $fwd_fallback_remaining;

            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header X-Bunshin-Client-Address $bunshin_client_address;

            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # broker /resolve へのサブリクエスト専用。access_by_lua から ngx.location.capture で呼ぶ。
        location = /_resolve {
            internal;
            set $broker_upstream http://${BROKER_HOST}:8080;
            proxy_pass $broker_upstream/resolve;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
            proxy_set_header X-Runner-Url "";
            proxy_set_header X-Fallback-Stack $relay_fallback_stack;
            proxy_set_header X-Fallback-Remaining $relay_fallback_remaining;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }
    }
}
