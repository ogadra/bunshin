# ブラウザから preview iframe を動かすローカル demo 用の override。
# docker compose -f compose.yml -f compose.local.yml up -d --build で使う。
# ブラウザは *.localhost を DNS 設定なしで 127.0.0.1 に解決するため、
# {hex}.ap-northeast-1.localhost が nginx の port-forward server に届く。
# integration profile は internal.test 前提のため、この override を付けたまま実行しない。
services:
  nginx:
    environment:
      INTERNAL_DOMAIN: localhost
