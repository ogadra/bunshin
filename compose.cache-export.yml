# PR run が保存した GHA cache は同一 PR からしか参照されず、
# 他 branch へ共有されるのは main で保存した cache のみ。
# そのため cache_to は main push の CI だけがこの override を重ねて有効化する。
services:
  nginx:
    build:
      cache_to:
        - type=gha,scope=nginx,mode=max

  broker:
    build:
      cache_to:
        - type=gha,scope=broker,mode=max

  runner-1:
    build:
      cache_to:
        - type=gha,scope=runner,mode=max

  integration-test:
    build:
      cache_to:
        - type=gha,scope=integration,mode=max
