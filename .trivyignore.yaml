vulnerabilities:
  # Bundled gems of the Ruby toolchain pulled in by the hands-on lolcat demo.
  # The runner is a sandbox that already executes arbitrary user commands, so
  # these gems sit outside its trust boundary. Scoped to the ruby store path so
  # the same CVE id stays reported anywhere else it might appear.
  - id: CVE-2026-27820
    paths:
      - "**/*ruby-3.4*/**"
    statement: zlib gem bundled with the Ruby devshell tool
  - id: CVE-2026-41316
    paths:
      - "**/*ruby-3.4*/**"
    statement: erb gem bundled with the Ruby devshell tool
  - id: CVE-2026-42245
    paths:
      - "**/*ruby-3.4*/**"
    statement: net-imap gem bundled with the Ruby devshell tool
  - id: CVE-2026-42246
