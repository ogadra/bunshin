  # Vendored wheel metadata inside the python setuptools that the prebuilt
  # fastfetch closure drags in. Same sandbox trust-boundary reasoning as above.
  - id: CVE-2026-24049
    paths:
      - "**/*setuptools*/**"
    statement: vendored wheel in the fastfetch toolchain's python setuptools
