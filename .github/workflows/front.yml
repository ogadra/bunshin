name: Front

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "front/**"
      - ".github/workflows/front.yml"
      - ".github/actions/setup-front/**"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-front
      - run: pnpm check
        working-directory: front

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-front
      - run: pnpm test
        working-directory: front

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-front
      - run: pnpm build
        working-directory: front
