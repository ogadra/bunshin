name: Deploy Runner

on:
  workflow_run:
    workflows: ["Runner"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-runner
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # if: github.event.workflow_run.conclusion == 'success'
    if: false # deploy disabled: production environment removed
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.DEPLOY_RUNNER_ROLE_ARN }}
          aws-region: ap-northeast-1
      - uses: aws-actions/amazon-ecr-login@376925c9d111252e87ae59691e5a442dd100ef6a # v2.1.3
        id: ecr-login
      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          docker build \
            -t "$ECR_REGISTRY/bunshin/runner:${IMAGE_TAG}" \
            -t "$ECR_REGISTRY/bunshin/runner:${IMAGE_TAG::7}" \
            -t "$ECR_REGISTRY/bunshin/runner:latest" \
            runner/
          docker push "$ECR_REGISTRY/bunshin/runner:${IMAGE_TAG}"
          docker push "$ECR_REGISTRY/bunshin/runner:${IMAGE_TAG::7}"
          docker push "$ECR_REGISTRY/bunshin/runner:latest"
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster bunshin \
            --service bunshin-runner \
            --force-new-deployment
          aws ecs wait services-stable \
            --cluster bunshin \
            --services bunshin-runner
