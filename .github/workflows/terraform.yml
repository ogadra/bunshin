name: Terraform

on:
  push:
    branches:
      - main
    paths:
      - "terraform/aws/**"
      - "terraform/google-cloud/**"
      - "terraform/shared/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "terraform/aws/**"
      - "terraform/google-cloud/**"
      - "terraform/shared/**"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        vendor: ["terraform/aws", "terraform/google-cloud", "terraform/shared"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.15"
      - name: terraform fmt check
        run: terraform -chdir=${{ matrix.vendor }} fmt -check
      - name: terraform init
        run: terraform -chdir=${{ matrix.vendor }} init -backend=false
      - name: terraform validate
        run: terraform -chdir=${{ matrix.vendor }} validate -json | jq -e '.warning_count == 0 and .error_count == 0'

  tflint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        vendor: ["terraform/aws", "terraform/google-cloud", "terraform/shared"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0
      - name: tflint init
        run: cd ${{ matrix.vendor }} && tflint --init
      - name: tflint
        run: cd ${{ matrix.vendor }} && tflint
