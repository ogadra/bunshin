name: Nginx

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "nginx/**"
      - ".github/workflows/nginx.yml"

permissions:
  contents: read

jobs:
  nginx-config-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Build config-test stage
        run: docker build --target config-test -t nginx-config-test nginx/
      - name: Run Lua unit tests
        run: |
          docker run --rm nginx-config-test /usr/local/openresty/luajit/bin/luajit /usr/local/openresty/nginx/lua/runner_url_test.lua
          docker run --rm nginx-config-test /usr/local/openresty/luajit/bin/luajit /usr/local/openresty/nginx/lua/resolve_core_test.lua
