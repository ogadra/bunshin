name: Integration

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "broker/**"
      - "runner/**"
      - "nginx/**"
      - "integration/**"
      - "compose.yml"
      - "init/**"
      - ".env.example"
      - ".github/workflows/integration.yml"

permissions:
  contents: read

jobs:
  integration-go:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0
      - name: Build integration images
        run: docker compose --env-file .env.example --profile integration build nginx broker runner-1 runner-2 integration-test forward-cert forward-target
      - name: Run integration tests
        run: docker compose --env-file .env.example --profile integration run --rm integration-test
      - name: Cleanup
        if: always()
        run: docker compose --env-file .env.example --profile integration down -v
