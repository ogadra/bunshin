name: Integration

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "broker/**"
      - "runner/**"
      - "nginx/**"
      - "front/**"
      - "integration/**"
      - "compose.yml"
      - "init/**"
      - ".env.example"
      - ".github/workflows/integration.yml"

permissions:
  contents: read

jobs:
  integration-go:
    strategy:
      fail-fast: false
      matrix:
        include:
          - pattern: amd64
            image_platform: linux/amd64
          - pattern: arm64
            image_platform: linux/arm64
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      IMAGE_PLATFORM: ${{ matrix.image_platform }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build integration images
        run: docker compose --env-file .env.example --profile integration build nginx broker runner-1 forward-cert front
      - name: Verify front boots
        # `--no-deps` を付けないと nginx / forward-cert も起動し、
        # 続く integration-test の起動時に forward-cert が再走して
        # cert が入れ替わり、既に読み込み済みの nginx が新 cert を verify できず 502 になる。
        run: docker compose --env-file .env.example --profile integration up --wait --no-deps front
      - name: Run integration tests
        run: docker compose --env-file .env.example --profile integration run --rm integration-test
      - name: Cleanup
        if: always()
        run: docker compose --env-file .env.example --profile integration down -v
