name: Broker

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "broker/**"
      - "compose.yml"
      - ".env.example"
      - ".github/workflows/broker.yml"

permissions:
  contents: read

jobs:
  lint-broker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
      - name: gofmt check
        run: |
          unformatted="$(gofmt -l broker/)" || exit 1
          test -z "$unformatted" || {
            printf '%s\n' "$unformatted"
            exit 1
          }
      - name: go vet
        run: cd broker && go vet ./...

  test-broker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run tests and enforce 100% coverage
        run: docker build --target test broker/

  test-broker-race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run race detector
        run: docker build --target test-race broker/

  test-broker-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run integration tests
        run: docker compose --profile test run --rm broker-test

  build-broker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build
        run: docker build -t broker broker/
      - uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: image
          image-ref: broker
