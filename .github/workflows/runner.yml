name: Runner

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "runner/**"
      - ".github/workflows/runner.yml"

permissions:
  contents: read

jobs:
  lint-runner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
      - name: gofmt check
        run: |
          unformatted="$(gofmt -l runner/)" || exit 1
          test -z "$unformatted" || {
            printf '%s\n' "$unformatted"
            exit 1
          }
      - name: go vet
        run: cd runner && go vet ./...

  test-runner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run tests and enforce 100% coverage
        run: docker build --target test runner/

  test-runner-race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run race detector
        run: docker build --target test-race runner/

  test-runner-perl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Module::Refresh
        run: sudo apt-get install -y libmodule-refresh-perl
      - name: Syntax check server.pl / DaiKichijoji.pm / BunshinServer.pm
        run: |
          perl -Irunner/app -c runner/app/BunshinServer.pm
          perl -Irunner/app -c runner/app/server.pl
          perl -c runner/app/DaiKichijoji.pm
      - name: Run Perl tests
        run: prove -Irunner/app -v runner/app/t/

  build-runner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build
        run: docker build -t sandbox-server runner/
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: sandbox-server
