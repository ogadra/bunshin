apiVersion: apps/v1
kind: Deployment
metadata:
  name: runner
  namespace: bunshin
  labels:
    app: runner
  annotations:
    checkov.io/skip1: CKV_K8S_14=image tag is a git SHA (immutable); latest is not used
    checkov.io/skip2: CKV_K8S_15=image tag is a git SHA (immutable); Always is redundant
    checkov.io/skip3: CKV_K8S_20=Autopilot blocks privilege escalation at admission
    checkov.io/skip4: CKV_K8S_22=runner executes user commands and requires writable rootfs
    checkov.io/skip5: CKV_K8S_23=Autopilot forbids running as root at admission
    checkov.io/skip6: CKV_K8S_28=Autopilot blocks NET_RAW and other elevated capabilities
    checkov.io/skip7: CKV_K8S_29=Autopilot enforces baseline pod-level securityContext
    checkov.io/skip8: CKV_K8S_30=Autopilot enforces baseline container-level securityContext
    checkov.io/skip9: CKV_K8S_31=Autopilot enforces runtime/default seccomp profile
    checkov.io/skip10: CKV_K8S_37=Autopilot enforces baseline capability drops
    checkov.io/skip11: CKV_K8S_38=runner SA has no cluster API access; token mount is inert
    checkov.io/skip12: CKV_K8S_40=Autopilot manages runAsUser
    checkov.io/skip13: CKV_K8S_43=image tag is a git SHA (immutable); digest form is redundant
    checkov.io/skip14: CKV2_K8S_6=Autopilot provides default-deny NetworkPolicy at the cluster level
spec:
  replicas: ${RUNNER_REPLICAS}
  selector:
    matchLabels:
      app: runner
  template:
    metadata:
      labels:
        app: runner
    spec:
      serviceAccountName: runner
      containers:
        - name: runner
          image: ${REGION}-docker.pkg.dev/${GOOGLE_CLOUD_PROJECT}/${REPOSITORY}/runner:${IMAGE_TAG}
          ports:
            - containerPort: 3000
              protocol: TCP
            - containerPort: 5000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 3
          env:
            - name: STACK_NAME
              value: ${REGION}
            - name: RUNNER_PORT
              value: "3000"
            - name: BROKER_URL
              value: http://broker.bunshin.svc.cluster.local:8080
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
              ephemeral-storage: 1Gi
            limits:
              cpu: 250m
              memory: 512Mi
              ephemeral-storage: 1Gi
